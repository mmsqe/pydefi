# Alembic configuration for pydefi/indexer
# -----------------------------------------
# This file is used by the alembic CLI tool.
# Usage:
#   cd pydefi/indexer
#   alembic upgrade head

[alembic]
# Path to the migration scripts, relative to this file.
script_location = migrations

# Template used for new revision files.
# file_template = %%(rev)s_%%(slug)s

# Default database URL — override with PYDEFI_DB_URL environment variable
# or pass -x db_url=sqlite:///mydb.db on the command line.
sqlalchemy.url = sqlite:///pools.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
