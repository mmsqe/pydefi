name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uv-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify uv sync for dev dependencies
        run: uv sync --locked --extra dev

  lint-fix:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Format and lint (auto-fix)
        run: |
          ruff format .
          ruff check --fix .

      - name: Commit and push fixes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "style: auto-fix ruff format and lint"
          branch: ${{ github.head_ref }}

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Lint (check)
        run: ruff check .

      - name: Format (check)
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit tests
        run: pytest -m "not live and not fork"

  live-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run live integration tests
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
          UNISWAP_API_KEY: ${{ secrets.UNISWAP_API_KEY }}
        run: pytest -m live -v --reruns 3 --reruns-delay 5

  fork-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Install Foundry (Anvil)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run fork transaction execution tests
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
          UNISWAP_API_KEY: ${{ secrets.UNISWAP_API_KEY }}
        run: pytest -m fork -v --reruns 2 --reruns-delay 5

